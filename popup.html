<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="icons/icon-48.png" alt="Clay" class="logo">
    <h1>Clay</h1>
  </div>

  <div class="section">
    <div class="section-title">
      MCP Servers
      <button id="addServerBtn" class="add-btn" title="Add server">+</button>
    </div>
    <div id="serverList" class="server-list">
      <div class="empty-state">No servers configured.</div>
    </div>
  </div>

  <!-- Add Server Form (hidden by default) -->
  <div id="addForm" class="section add-form hidden">
    <div class="section-title">Add Server</div>
    <input type="text" id="serverName" placeholder="Name (e.g. github)" spellcheck="false">
    <input type="text" id="serverPackage" placeholder="npm package (e.g. @modelcontextprotocol/server-github)" spellcheck="false">
    <input type="text" id="serverArgs" placeholder="Additional args (e.g. /Users/chad/projects)" spellcheck="false">
    <div id="envFields" class="env-fields"></div>
    <button id="addEnvBtn" class="link-btn">+ Add env variable</button>
    <div class="form-actions">
      <button id="cancelAddBtn" class="btn-secondary">Cancel</button>
      <button id="saveServerBtn" class="btn-primary">Add</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Import External Config</div>
    <div class="config-row">
      <input type="text" id="importPath" placeholder="~/.claude/claude_desktop_config.json" spellcheck="false">
      <button id="importBtn" title="Import">Import</button>
    </div>
    <div id="importStatus" class="status"></div>
    <div id="importedPaths" class="imported-paths"></div>
  </div>

  <div class="section">
    <div class="section-title">Native Host</div>
    <div id="hostStatus" class="status">
      <span class="dot dot-unknown"></span>
      <span>Checking...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
